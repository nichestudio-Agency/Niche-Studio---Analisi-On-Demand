<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche Studio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Manterrei i tuoi stili originali, aggiungo solo il necessario per i grafici */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .loading-rows { display: flex; align-items: center; justify-content: center; padding: 3rem; gap: 1rem; color: #6366f1; font-weight: 600; }
        .table-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="flex min-h-screen">
        <main class="flex-1 p-8">
            <div id="tab-lead" class="tab-pane active">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-bold">Storico Lead</h1>
                    <button onclick="loadLeads()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                        🔄 Aggiorna Dati
                    </button>
                </div>
                
                <div id="leadTableContainer" class="bg-white rounded-xl shadow-sm overflow-hidden">
                    </div>
            </div>

            <div id="tab-stats" class="tab-pane hidden">
                <h1 class="text-3xl font-bold mb-8">Analisi Performance</h1>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Total Lead</p>
                        <h2 id="stat-total-leads" class="text-4xl font-black mt-2 text-indigo-600">0</h2>
                    </div>
                    <div class="stat-card">
                        <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Media Score</p>
                        <h2 id="stat-avg-score" class="text-4xl font-black mt-2 text-emerald-600">0</h2>
                    </div>
                    <div class="stat-card">
                        <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Lead Inviati</p>
                        <h2 id="stat-sent-leads" class="text-4xl font-black mt-2 text-amber-600">0</h2>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="stat-card">
                        <h3 class="font-bold mb-4 text-slate-700">Distribuzione Categorie</h3>
                        <div class="chart-container">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                    <div class="stat-card">
                        <h3 class="font-bold mb-4 text-slate-700">Andamento Score</h3>
                        <div class="chart-container">
                            <canvas id="scoreChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allLeads = [];
        let categoryChart = null;
        let scoreChart = null;

        // Funzione per caricare i dati (Sia per tabella che per statistiche)
        async function loadLeads() {
            const container = document.getElementById('leadTableContainer');
            container.innerHTML = '<div class="loading-rows"><div class="table-spinner"></div>Sincronizzazione con Google Sheets...</div>';

            try {
                const response = await fetch('https://primary-production-82234.up.railway.app/webhook/get-leads');
                if (!response.ok) throw new Error('Errore server');
                
                const data = await response.json();
                
                // Pulizia dati: trasforma in array e pulisce i numeri
                allLeads = (Array.isArray(data) ? data : (data.leads || [])).map(item => {
                    const row = item.json || item;
                    return {
                        ...row,
                        'Score (1-10)': parseFloat(row['Score (1-10)']) || 0,
                        'Follower': parseInt(String(row['Follower']).replace(/[^0-9]/g, '')) || 0
                    };
                });

                console.log("Dati elaborati:", allLeads);
                renderLeadTable();
                if (!document.getElementById('tab-stats').classList.contains('hidden')) {
                    renderStats();
                }

            } catch (error) {
                console.error("Errore:", error);
                container.innerHTML = `<div class="p-8 text-center text-red-500">Impossibile caricare i dati. Controlla n8n.</div>`;
            }
        }

        // Funzione per aggiornare lo Stato (Tasto Segna Inviato)
        async function updateLeadStatus(username, newStatus) {
            try {
                const response = await fetch('https://primary-production-82234.up.railway.app/webhook/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, status: newStatus })
                });

                if (response.ok) {
                    // Aggiorna localmente
                    const lead = allLeads.find(l => l.Username === username);
                    if (lead) lead.Status = newStatus;
                    renderLeadTable(); // Rinfresca la vista
                } else {
                    alert("Errore nell'aggiornamento del foglio Google");
                }
            } catch (error) {
                alert("Errore di connessione a n8n");
            }
        }

        // Funzione Statistiche (Corretta per Chart.js)
        function renderStats() {
            if (allLeads.length === 0) return;

            // Box Numerici
            document.getElementById('stat-total-leads').textContent = allLeads.length;
            
            const scores = allLeads.map(l => l['Score (1-10)']).filter(s => s > 0);
            const avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : 0;
            document.getElementById('stat-avg-score').textContent = avg;
            
            const sent = allLeads.filter(l => l.Status === 'Inviato').length;
            document.getElementById('stat-sent-leads').textContent = sent;

            // Grafico Categorie
            const cats = {};
            allLeads.forEach(l => { cats[l.Categoria] = (cats[l.Categoria] || 0) + 1; });

            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{
                        data: Object.values(cats),
                        backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Switch Tab migliorato
        function switchTab(tabName) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            
            if (tabName === 'lead' || tabName === 'stats') {
                loadLeads();
            }
        }

        // Inizializzazione
        window.onload = loadLeads;

        function renderLeadTable() {
            const container = document.getElementById('leadTableContainer');
            if (allLeads.length === 0) {
                container.innerHTML = '<p class="p-8 text-center">Nessun lead trovato.</p>';
                return;
            }

            let html = `<table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 font-bold text-slate-600">Username</th>
                        <th class="p-4 font-bold text-slate-600">Score</th>
                        <th class="p-4 font-bold text-slate-600">Status</th>
                        <th class="p-4 font-bold text-slate-600">Azioni</th>
                    </tr>
                </thead>
                <tbody>`;

            allLeads.forEach(lead => {
                const statusColor = lead.Status === 'Inviato' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700';
                html += `<tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="p-4 font-medium">@${lead.Username}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded bg-indigo-50 text-indigo-700 font-bold">${lead['Score (1-10)']}</span></td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${lead.Status || 'Da gestire'}</span></td>
                    <td class="p-4">
                        <button onclick="updateLeadStatus('${lead.Username}', 'Inviato')" class="text-xs bg-slate-900 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-600 transition">
                            Segna Inviato
                        </button>
                    </td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
