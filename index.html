<script>
// ===== VARIABILI GLOBALI =====
let allLeads = []; // Qui salviamo i dati per non richiamarli ogni volta
let categoryChart = null;
let scoreChart = null;

// ===== FUNZIONE CARICAMENTO DATI (STORICO) =====
async function loadLeads() {
    const container = document.getElementById('leadTableContainer');
    // Mantengo il tuo stile di caricamento
    if (container) container.innerHTML = '<div class="loading-rows"><div class="table-spinner"></div>Sincronizzazione database...</div>';

    try {
        const response = await fetch('https://primary-production-82234.up.railway.app/webhook/get-leads');
        if (!response.ok) throw new Error('Errore server');
        
        const data = await response.json();
        
        // PULIZIA DATI: Trasformiamo i dati di n8n in formato leggibile per la tua grafica
        allLeads = (Array.isArray(data) ? data : (data.leads || [])).map(item => {
            const row = item.json || item;
            return {
                ...row,
                // Assicuriamoci che Score e Follower siano numeri per i tuoi grafici
                'Score (1-10)': parseFloat(row['Score (1-10)']) || 0,
                'Follower': parseInt(String(row['Follower'] || '0').replace(/[^0-9]/g, '')) || 0
            };
        });

        console.log("Dati caricati:", allLeads);
        
        // Richiama la tua funzione originale per disegnare la tabella
        filterLeads(); 
        
        // Se l'utente è sulla tab statistiche, aggiorna i grafici
        if (document.getElementById('tab-stats') && !document.getElementById('tab-stats').classList.contains('hidden')) {
            renderStats();
        }

    } catch (error) {
        console.error("Errore fetch:", error);
        if (container) container.innerHTML = '<div class="empty-state">Errore nel caricamento dati.</div>';
    }
}

// ===== FUNZIONE AGGIORNAMENTO STATO (TASTO) =====
async function updateLeadStatus(username, newStatus) {
    try {
        // Chiamata al nuovo ramo del workflow n8n
        const response = await fetch('https://primary-production-82234.up.railway.app/webhook/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, status: newStatus })
        });

        if (response.ok) {
            // Aggiorna il dato nel foglio locale senza ricaricare tutta la pagina
            const lead = allLeads.find(l => l.Username === username);
            if (lead) lead.Status = newStatus;
            filterLeads(); // Riesegue il render della tua tabella con lo stato nuovo
        } else {
            alert("Errore durante l'aggiornamento su Google Sheets");
        }
    } catch (error) {
        console.error("Errore:", error);
        alert("Connessione fallita");
    }
}

// ===== CORREZIONE RENDER STATS (Per non far bloccare i grafici) =====
function renderStats() {
    // Verifichiamo che i canvas esistano nel tuo HTML
    const catCanvas = document.getElementById('categoryChart');
    if (!catCanvas || allLeads.length === 0) return;

    // Calcolo medie per i tuoi box numerici
    document.getElementById('stat-total-leads').textContent = allLeads.length;
    
    const scores = allLeads.map(l => l['Score (1-10)']).filter(s => s > 0);
    const avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : 0;
    document.getElementById('stat-avg-score').textContent = avg;

    // Rendering Grafico Categorie (Mantengo il tuo stile)
    const cats = {};
    allLeads.forEach(l => { 
        const c = l.Categoria || 'N/A';
        cats[c] = (cats[c] || 0) + 1; 
    });

    if (categoryChart) categoryChart.destroy();
    categoryChart = new Chart(catCanvas.getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(cats),
            datasets: [{
                data: Object.values(cats),
                backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// All'avvio carica i lead
window.onload = loadLeads;
</script>
